name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit, API and smoke tests
        run: npm test

      - name: Run Cypress E2E
        uses: cypress-io/github-action@v6
        with:
          start: npm start
          wait-on: http://localhost:3000/api/health
