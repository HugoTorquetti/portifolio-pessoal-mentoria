name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality-gate:
    name: API Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit, API and smoke tests
        run: npm test

      - name: Upload API Mochawesome report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-mochawesome-report
          path: mochawesome-report/api
          if-no-files-found: ignore
